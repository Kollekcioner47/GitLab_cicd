services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notesdb
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  app:
    build: ./api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/notesdb
    depends_on:
      - db

  web:
    build: ./web-ui
    ports:
      - 8080:8080
    environment:
      API_URL: http://app:8000
    depends_on:
      - app

volumes:
  postgres_data:
