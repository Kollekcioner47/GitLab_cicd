services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: crmdb
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crmdb"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql://crm:secret@db:5432/crmdb"
    ports:
      - "8000:8000"
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_URL: "http://backend:8000"
    ports:
      - "8080:8000"
    depends_on:
      - backend
